# ─── Notification Mutations ──────────────────────────────────────────────────

mutation CreateNotification(
  $userId: UUID!
  $branchId: UUID!
  $title: String!
  $message: String!
  $audienceRole: String
  $createdById: UUID
  $createdByRole: String
  $category: String
  $academicYear: Int
) @auth(level: USER) @transaction {
  query @redact {
    # Only authenticated staff belonging to the target branch can create notifications.
    # $branchId is the recipient's branch; caller must be affiliated with that branch.
    callerStaff: users(
      where: {
        _and: [
          {firebaseUID: {eq_expr: "auth.uid"}}
          {isActive: {eq: true}}
          {
            _or: [
              {role: {in: ["MAIN_ADMIN", "main_admin"]}}
              {userRoles_on_user: {exist: {role: {in: ["MAIN_ADMIN", "main_admin"]}}}}
              {branches_on_principal: {exist: {id: {eq: $branchId}, isActive: {eq: true}}}}
              {branches_on_branchAdmin: {exist: {id: {eq: $branchId}, isActive: {eq: true}}}}
              {coordinators_on_user: {exist: {branchId: {eq: $branchId}, isActive: {eq: true}}}}
              {
                _and: [
                  {branchId: {eq: $branchId}}
                  {
                    _or: [
                      {role: {in: ["TEACHER", "teacher", "CLASS_TEACHER", "class_teacher", "ACCOUNTANT", "accountant"]}}
                      {userRoles_on_user: {exist: {role: {in: ["TEACHER", "teacher", "CLASS_TEACHER", "class_teacher", "ACCOUNTANT", "accountant"]}}}}
                    ]
                  }
                ]
              }
            ]
          }
        ]
      }
      limit: 1
    ) @check(expr: "this.exists(u, true)", message: "Only authenticated staff can create notifications") {
      id
      role
    }
  }
  notification_insert(
    data: {
      userId: $userId
      branchId: $branchId
      title: $title
      message: $message
      audienceRole: $audienceRole
      createdById: $createdById
      createdByRole: $createdByRole
      category: $category
      academicYear: $academicYear
      isRead: false
    }
  )
}

mutation DeleteNotification($id: UUID!) @auth(level: USER) @transaction {
  query @redact {
    # Allow: (1) the notification RECIPIENT to remove it from their own inbox,
    # (2) the notification CREATOR (staff who broadcast it) to retract it,
    # (3) MAIN_ADMIN for admin cleanup.
    callerAuthorized: users(
      where: {
        _and: [
          {firebaseUID: {eq_expr: "auth.uid"}}
          {isActive: {eq: true}}
          {
            _or: [
              {role: {in: ["MAIN_ADMIN", "main_admin"]}}
              {userRoles_on_user: {exist: {role: {in: ["MAIN_ADMIN", "main_admin"]}}}}
              # Recipient: this notification is addressed to the authenticated user
              {notifications_on_user: {exist: {id: {eq: $id}}}}
              # Creator: authenticated user broadcast/created this notification
              {notifications_on_createdBy: {exist: {id: {eq: $id}}}}
            ]
          }
        ]
      }
      limit: 1
    ) @check(expr: "this.exists(u, true)", message: "Only the notification recipient, creator, or Main Admin can delete notifications") {
      id
    }
  }
  notification_delete(id: $id)
}

mutation MarkNotificationRead($id: UUID!) @auth(level: USER) @transaction {
  query @redact {
    # Verify this notification belongs to the authenticated user
    notificationOwner: notifications(
      where: {
        id: {eq: $id}
        user: {firebaseUID: {eq_expr: "auth.uid"}}
      }
      limit: 1
    ) @check(expr: "this.exists(n, true)", message: "Can only mark your own notifications as read") {
      id
    }
  }
  notification_update(id: $id, data: {isRead: true})
}

mutation MarkAllNotificationsRead($userId: UUID!) @auth(level: USER) @transaction {
  query @redact {
    # Verify $userId belongs to the authenticated caller — prevents marking other users' notifications
    selfCheck: users(
      where: {id: {eq: $userId}, firebaseUID: {eq_expr: "auth.uid"}, isActive: {eq: true}}
      limit: 1
    ) @check(expr: "this.exists(u, true)", message: "Can only mark your own notifications as read") {
      id
    }
  }
  notification_updateMany(
    where: {userId: {eq: $userId}, isRead: {eq: false}}
    data: {isRead: true}
  )
}

# ── Admin: Change User Primary Role ──────────────────────────────────────────
# Updates users.role (the authoritative primary role column) to $newRole,
# then atomically cleans up stale user_roles entries and re-inserts the new
# primary role. PARENT add-on rows are preserved.
# Restricted to MAIN_ADMIN callers.
mutation ChangeUserPrimaryRole($userId: UUID!, $newRole: String!) @auth(level: USER) @transaction {
  query @redact {
    caller: users(
      where: {firebaseUID: {eq_expr: "auth.uid"}, isActive: {eq: true}}
      limit: 1
    ) @check(expr: "this.exists(u, u.role == 'MAIN_ADMIN')", message: "Main Admin only") {
      id
      role
    }
    targetUser: users(where: {id: {eq: $userId}, isActive: {eq: true}}, limit: 1) {
      id
      role
    }
  }
  # 1. Write the new authoritative primary role.
  user_update(id: $userId, data: {role: $newRole})
  # 2. Remove all non-PARENT user_roles rows (clears stale entries).
  staleRoles_clean: userRole_deleteMany(
    where: {userId: {eq: $userId}, role: {ne: "PARENT"}}
  )
  # 3. Re-add the new primary role.
  userRole_upsert(data: {userId: $userId, role: $newRole})
}

# Adds a secondary role to a user's user_roles table without changing users.role.
# Call AFTER ChangeUserPrimaryRole to attach additional roles (e.g. PARENT add-on).
# MAIN_ADMIN only.
mutation AddAdditionalRole($userId: UUID!, $role: String!) @auth(level: USER) @transaction {
  query @redact {
    caller: users(
      where: {firebaseUID: {eq_expr: "auth.uid"}, isActive: {eq: true}}
      limit: 1
    ) @check(expr: "this.exists(u, u.role == 'MAIN_ADMIN')", message: "Main Admin only") {
      id
      role
    }
  }
  userRole_upsert(data: {userId: $userId, role: $role})
}

# One-time admin tool to remove stale user_roles entries for a specific user.
# Call this from MAIN_ADMIN after changing a user's primary role via the DB or
# Firebase Console without going through the normal role-assignment flow.
# Keeps PARENT add-on intact. Re-inserts users.role as the sole primary entry.
mutation CleanUserRolesToPrimary($userId: UUID!) @auth(level: USER) @transaction {
  query @redact {
    adminUser: users(
      where: {firebaseUID: {eq_expr: "auth.uid"}, isActive: {eq: true}}
      limit: 1
    ) @check(expr: "this.exists(u, u.role == 'MAIN_ADMIN' || u.role == 'main_admin')", message: "Main Admin only") {
      id
      role
    }
    targetUser: users(where: {id: {eq: $userId}, isActive: {eq: true}}, limit: 1) {
      id
      role
    }
  }
  staleRoles_clean: userRole_deleteMany(
    where: {
      userId: {eq: $userId}
      role: {ne: "PARENT"}
    }
  )
  userRole_upsert(
    data: {
      userId_expr: "response.query.targetUser[0].id"
      role_expr: "response.query.targetUser[0].role"
    }
  )
}


