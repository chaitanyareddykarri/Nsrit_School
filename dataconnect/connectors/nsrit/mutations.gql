mutation AssignPrincipal(
  $branchId: UUID!
  $principalId: UUID!
  $employeeId: String!
  $joiningYear: Int!
  $branchCode: String!
  $serialNumber: Int!
) @auth(level: USER) @transaction {
  query @redact {
    users(
      where: {firebaseUID: {eq_expr: "auth.uid"}, isActive: {eq: true}}
      limit: 1
    ) @check(expr: "this.exists(u, u.role == 'MAIN_ADMIN' || u.role == 'main_admin')", message: "Main Admin required") {
      id
      role
    }
  }
  employeeSequence_upsert(
    data: {
      year: $joiningYear
      branchCode: $branchCode
      staffType: "TEACHING"
      lastSequence: $serialNumber
      updatedAt_expr: "request.time"
    }
  )
  staffIdSequence_upsert(
    data: {
      joiningYear: $joiningYear
      branchCode: $branchCode
      staffType: "TEACHING"
      lastSerialNumber: $serialNumber
      updatedAt_expr: "request.time"
    }
  )
  user_update(
    id: $principalId
    data: {
      employeeId: $employeeId
      staffType: "TEACHING"
      updatedAt_expr: "request.time"
    }
  )
  branch_update(
    id: $branchId
    data: {
      principal: {id: $principalId}
      updatedAt_expr: "request.time"
    }
  )
  auditLog_insert(
    data: {
      performedBy_expr: "response.query.users[0].id"
      performedRole_expr: "response.query.users[0].role"
      action: "STAFF_CREATED"
      entityType: "STAFF"
      entityId: $employeeId
      branchId: $branchId
      newData: "Principal teaching staff created"
    }
  )
}

mutation CreateClass($branchId: UUID!, $wingId: UUID!, $name: String!, $displayOrder: Int) @auth(level: USER) @transaction {
  query @redact {
    users(
      where: {
        _and: [
          {firebaseUID: {eq_expr: "auth.uid"}}
          {isActive: {eq: true}}
          {
            _or: [
              {role: {in: ["MAIN_ADMIN", "main_admin"]}}
              {userRoles_on_user: {exist: {role: {in: ["MAIN_ADMIN", "main_admin"]}}}}
              {branches_on_principal: {exist: {id: {eq: $branchId}, isActive: {eq: true}}}}
              {
                _and: [
                  {branchId: {eq: $branchId}}
                  {
                    _or: [
                      {role: {in: ["PRINCIPAL", "principal"]}}
                      {userRoles_on_user: {exist: {role: {in: ["PRINCIPAL", "principal"]}}}}
                    ]
                  }
                ]
              }
            ]
          }
        ]
      }
      limit: 1
    ) @check(expr: "this.exists(u, true)", message: "Class creation access required") {
      id
      role
      branchId
    }
  }
  academicClass_insert(
    data: {
      branch: {id: $branchId}
      wing: {id: $wingId}
      name: $name
      displayOrder: $displayOrder
      isActive: true
      updatedAt_expr: "request.time"
    }
  )
}


