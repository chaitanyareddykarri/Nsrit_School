# ── Per-student promotion mutation ───────────────────────────────────────────
# promotionStatus: PROMOTED | REPEATED | DROPPED | TRANSFERRED
# toSectionId and toClassId are required for PROMOTED, optional for others.

mutation RecordStudentPromotion(
  $branchId: UUID!
  $studentId: UUID!
  $fromClassId: UUID!
  $fromSectionId: UUID!
  $toClassId: UUID
  $toSectionId: UUID
  $promotionStatus: String!
  $academicYear: Int!
  $remarks: String
) @auth(level: USER) @transaction {
  query @redact {
    caller: users(
      where: {firebaseUID: {eq_expr: "auth.uid"}, isActive: {eq: true}}
      limit: 1
    ) @check(expr: "this.exists(u, u.role == 'PRINCIPAL' || u.role == 'COORDINATOR' || u.role == 'MAIN_ADMIN')", message: "Principal or Coordinator only") {
      id
      role
    }
  }
  studentPromotionHistory_insert(data: {
    branch: {id: $branchId}
    student: {id: $studentId}
    fromClass: {id: $fromClassId}
    fromSection: {id: $fromSectionId}
    toClass: {id: $toClassId}
    toSection: {id: $toSectionId}
    promotionStatus: $promotionStatus
    academicYear: $academicYear
    promotedById_expr: "response.query.caller[0].id"
    remarks: $remarks
  })
}

# Moves a student to the new section/class AND records the StudentAcademicHistory
# snapshot for the academic year being completed (the "from" placement). The
# snapshot is upserted on the (student, academicYear) unique key so re-running a
# promotion is idempotent. branchId/fromClassId/fromSectionId describe where the
# student sat during $academicYear; promotedToSection points to the new section.
mutation ApplyStudentPromotion(
  $studentId: UUID!
  $toSectionId: UUID!
  $toClassId: UUID!
  $branchId: UUID!
  $fromClassId: UUID!
  $fromSectionId: UUID!
  $academicYear: Int!
  $promotionStatus: String! = "PROMOTED"
) @auth(level: USER) @transaction {
  query @redact {
    caller: users(
      where: {firebaseUID: {eq_expr: "auth.uid"}, isActive: {eq: true}}
      limit: 1
    ) @check(expr: "this.exists(u, u.role == 'PRINCIPAL' || u.role == 'MAIN_ADMIN')", message: "Principal only") {
      id
      role
    }
  }
  studentAcademicHistory_upsert(data: {
    student: {id: $studentId}
    section: {id: $fromSectionId}
    academicClass: {id: $fromClassId}
    branch: {id: $branchId}
    promotedToSection: {id: $toSectionId}
    academicYear: $academicYear
    promotionStatus: $promotionStatus
    promotedById_expr: "response.query.caller[0].id"
    promotedAt_expr: "request.time"
    updatedAt_expr: "request.time"
  })
  student_update(id: $studentId, data: {
    sectionId: $toSectionId
    academicClassId: $toClassId
  })
}

