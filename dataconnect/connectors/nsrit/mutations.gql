mutation ClaimUserFirebaseUID($id: UUID!) @auth(level: USER) @transaction {
  query @redact {
    # Prevent duplicate claims: block if another active account already owns this Firebase UID
    duplicateClaim: users(
      where: {firebaseUID: {eq_expr: "auth.uid"}, id: {ne: $id}, isActive: {eq: true}}
      limit: 1
    ) @check(expr: "!this.exists(u, true)", message: "This Firebase account is already linked to another user record") {
      id
    }
    # Ensure the target user record exists and is active
    targetUser: users(
      where: {id: {eq: $id}, isActive: {eq: true}}
      limit: 1
    ) @check(expr: "this.exists(u, true)", message: "Target user account not found") {
      id
    }
  }
  user_update(
    id: $id
    data: {
      firebaseUID_expr: "auth.uid"
      updatedAt_expr: "request.time"
    }
  )
}

mutation EnsureCurrentUserLegacyRole @auth(level: USER) @transaction {
  query @redact {
    currentUser: users(
      where: {firebaseUID: {eq_expr: "auth.uid"}, isActive: {eq: true}}
      limit: 1
    ) @check(expr: "this.exists(u, true)", message: "Authenticated user required") {
      id
      role
    }
  }
  # Upsert the current primary role only. Does NOT delete other entries.
  # user_roles is managed exclusively through the ChangeUserRoleScreen admin
  # tool (SetUserRoles / AddAdditionalRole). Keeping upsert-only here means
  # multi-role assignments survive every login.
  userRole_upsert(
    data: {
      userId_expr: "response.query.currentUser[0].id"
      role_expr: "response.query.currentUser[0].role"
    }
  )
}

mutation AddParentRole($userId: UUID!, $branchId: UUID) @auth(level: USER) @transaction {
  query @redact {
    currentUser: users(
      where: {
        _and: [
          {firebaseUID: {eq_expr: "auth.uid"}}
          {isActive: {eq: true}}
          {
            _or: [
              {role: {in: ["MAIN_ADMIN", "main_admin"]}}
              {userRoles_on_user: {exist: {role: {in: ["MAIN_ADMIN", "main_admin"]}}}}
              {branches_on_principal: {exist: {id: {eq: $branchId}, isActive: {eq: true}}}}
              {branches_on_branchAdmin: {exist: {id: {eq: $branchId}, isActive: {eq: true}}}}
              {coordinators_on_user: {exist: {branchId: {eq: $branchId}, isActive: {eq: true}}}}
              {
                _and: [
                  {branchId: {eq: $branchId}}
                  {
                    _or: [
                      {role: {in: ["PRINCIPAL", "principal", "BRANCH_ADMIN", "branch_admin", "COORDINATOR", "coordinator"]}}
                      {userRoles_on_user: {exist: {role: {in: ["PRINCIPAL", "principal", "BRANCH_ADMIN", "branch_admin", "COORDINATOR", "coordinator"]}}}}
                    ]
                  }
                ]
              }
            ]
          }
        ]
      }
      limit: 1
    ) @check(expr: "this.exists(u, true)", message: "Parent role assignment denied") {
      id
      role
      branchId
    }
  }
  userRole_upsert(
    data: {
      user: {id: $userId}
      role: "PARENT"
    }
  )
  auditLog_insert(
    data: {
      user: {id: $userId}
      performedBy_expr: "response.query.currentUser[0].id"
      performedRole_expr: "response.query.currentUser[0].role"
      action: "ROLE_ADDED"
      entityType: "USER_ROLE"
      entityId_expr: "vars.userId"
      branchId: $branchId
      newRole: "PARENT"
      newData: "Parent role added"
    }
  )
}

mutation SwitchRole($userId: UUID!, $oldRole: String!, $newRole: String!) @auth(level: USER) @transaction {
  query @redact {
    currentUser: users(
      where: {id: {eq: $userId}, firebaseUID: {eq_expr: "auth.uid"}, isActive: {eq: true}}
      limit: 1
    ) @check(expr: "this.exists(u, true)", message: "Role switch denied") {
      id
      role
    }
    selectedRole: userRoles(
      where: {userId: {eq: $userId}, role: {eq: $newRole}}
      limit: 1
    ) @check(expr: "this.exists(r, true)", message: "Role is not assigned to this user") {
      id
      role
    }
  }
  user_update(
    id: $userId
    data: {
      role: $newRole
      updatedAt_expr: "request.time"
    }
  )
  auditLog_insert(
    data: {
      user: {id: $userId}
      performedBy_expr: "response.query.currentUser[0].id"
      performedRole: $oldRole
      actingAs: $newRole
      action: "ROLE_SWITCHED"
      entityType: "USER"
      entityId_expr: "vars.userId"
      oldRole: $oldRole
      newRole: $newRole
      oldData: $oldRole
      newData: $newRole
    }
  )
}

mutation LinkParentUser($parentId: UUID!, $userId: UUID!, $branchId: UUID) @auth(level: USER) @transaction {
  query @redact {
    # Only MAIN_ADMIN, BRANCH_ADMIN, or PRINCIPAL can link parent accounts
    callerUser: users(
      where: {
        _and: [
          {firebaseUID: {eq_expr: "auth.uid"}}
          {isActive: {eq: true}}
          {
            _or: [
              {role: {in: ["MAIN_ADMIN", "main_admin"]}}
              {userRoles_on_user: {exist: {role: {in: ["MAIN_ADMIN", "main_admin"]}}}}
              {branches_on_principal: {exist: {id: {eq: $branchId}, isActive: {eq: true}}}}
              {branches_on_branchAdmin: {exist: {id: {eq: $branchId}, isActive: {eq: true}}}}
              {
                _and: [
                  {branchId: {eq: $branchId}}
                  {
                    _or: [
                      {role: {in: ["PRINCIPAL", "principal", "BRANCH_ADMIN", "branch_admin"]}}
                      {userRoles_on_user: {exist: {role: {in: ["PRINCIPAL", "principal", "BRANCH_ADMIN", "branch_admin"]}}}}
                    ]
                  }
                ]
              }
            ]
          }
        ]
      }
      limit: 1
    ) @check(expr: "this.exists(u, true)", message: "Only administrators can link parent accounts") {
      id
      role
    }
  }
  parent_update(
    id: $parentId
    data: {
      user: {id: $userId}
      updatedAt_expr: "request.time"
    }
  )
}


