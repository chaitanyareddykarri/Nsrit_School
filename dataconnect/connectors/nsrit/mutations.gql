mutation UpdateTeacher(
  $teacherId: UUID!
  $userId: UUID!
  $fullName: String!
  $countryCode: String!
  $phoneNumber: String!
  $alternateMobileNumber: String
  $email: String
  $dateOfBirth: Date
  $gender: String!
  $joiningDate: Date!
  $designation: String!
  $qualification: String
  $experience: String
  $address: String
  $city: String
  $state: String
  $pincode: String
  $emergencyContact: String
  $bloodGroup: String
  $branchId: UUID!
  $wing: String @retired
  $isActive: Boolean!
) @auth(level: USER) @transaction {
  query @redact {
    users(
      where: {
        _and: [
          {firebaseUID: {eq_expr: "auth.uid"}}
          {isActive: {eq: true}}
          {
            _or: [
              {role: {in: ["MAIN_ADMIN", "main_admin"]}}
              {userRoles_on_user: {exist: {role: {in: ["MAIN_ADMIN", "main_admin"]}}}}
              {branches_on_principal: {exist: {id: {eq: $branchId}, isActive: {eq: true}}}}
              {branches_on_branchAdmin: {exist: {id: {eq: $branchId}, isActive: {eq: true}}}}
              {coordinators_on_user: {exist: {branchId: {eq: $branchId}, isActive: {eq: true}}}}
              {
                _and: [
                  {branchId: {eq: $branchId}}
                  {
                    _or: [
                      {role: {in: ["PRINCIPAL", "principal", "BRANCH_ADMIN", "branch_admin", "COORDINATOR", "coordinator"]}}
                      {userRoles_on_user: {exist: {role: {in: ["PRINCIPAL", "principal", "BRANCH_ADMIN", "branch_admin", "COORDINATOR", "coordinator"]}}}}
                    ]
                  }
                ]
              }
            ]
          }
        ]
      }
      limit: 1
    ) @check(expr: "this.exists(u, true)", message: "Branch staff management access required") {
      id
      role
      branchId
    }
    # C-2 security fix: verify the target teacher record belongs to the caller's branch.
    # Without this, a coordinator from Branch A could update a teacher from Branch B
    # simply by supplying Branch A's branchId with Branch B's teacherId.
    selectedTeacher: teachers(
      where: {id: {eq: $teacherId}, branchId: {eq: $branchId}, isActive: {eq: true}}
      limit: 1
    ) @check(expr: "this.exists(t, true)", message: "Teacher not found in this branch") {
      id
    }
    # Verify the user record also belongs to the same branch to prevent user_update IDOR.
    selectedUser: users(
      where: {id: {eq: $userId}, branchId: {eq: $branchId}, isActive: {eq: true}}
      limit: 1
    ) @check(expr: "this.exists(u, true)", message: "User not found in this branch") {
      id
    }
  }
  user_update(
    id: $userId
    data: {
      fullName: $fullName
      countryCode: $countryCode
      phoneNumber: $phoneNumber
      isActive: $isActive
      updatedAt_expr: "request.time"
    }
  )
  teacher_update(
    id: $teacherId
    data: {
      joiningDate: $joiningDate
      designation: $designation
      gender: $gender
      alternateMobileNumber: $alternateMobileNumber
      email: $email
      dateOfBirth: $dateOfBirth
      qualification: $qualification
      experience: $experience
      address: $address
      city: $city
      state: $state
      pincode: $pincode
      emergencyContact: $emergencyContact
      bloodGroup: $bloodGroup
      isActive: $isActive
      updatedAt_expr: "request.time"
    }
  )
  # L-3 fix: audit log was missing from UpdateTeacher (CreateTeacher already logs).
  auditLog_insert(
    data: {
      performedBy_expr: "response.query.users[0].id"
      performedRole_expr: "response.query.users[0].role"
      action: "STAFF_UPDATED"
      entityType: "STAFF"
      entityId_expr: "response.teacher_update.id"
      branchId: $branchId
      newData: "Teacher staff updated"
    }
  )
}

