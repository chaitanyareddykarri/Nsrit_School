# ── Holiday — extended insert (supports isPublicHoliday + isSeeded) ───────────
mutation CreatePublicHoliday(
  $branchId: UUID!
  $name: String!
  $date: Date!
  $type: String!
  $description: String
  $createdById: UUID!
  $isPublicHoliday: Boolean!
  $isSeeded: Boolean!
) @auth(level: USER) @transaction {
  query @redact {
    # Each non-MAIN_ADMIN role is scoped to the specific $branchId they manage.
    # Added COORDINATOR per business rules; BRANCH_ADMIN branch is via branches_on_branchAdmin.
    users(
      where: {
        _and: [
          {firebaseUID: {eq_expr: "auth.uid"}}
          {id: {eq: $createdById}}
          {isActive: {eq: true}}
          {
            _or: [
              {role: {in: ["MAIN_ADMIN", "main_admin"]}}
              {userRoles_on_user: {exist: {role: {in: ["MAIN_ADMIN", "main_admin"]}}}}
              {branches_on_principal: {exist: {id: {eq: $branchId}, isActive: {eq: true}}}}
              {branches_on_branchAdmin: {exist: {id: {eq: $branchId}, isActive: {eq: true}}}}
              {coordinators_on_user: {exist: {branchId: {eq: $branchId}, isActive: {eq: true}}}}
            ]
          }
        ]
      }
      limit: 1
    ) @check(expr: "this.exists(u, true)", message: "Holiday creation requires Principal, Coordinator, or Main Admin for the specified branch") {
      id
      role
      branchId
    }
  }
  holiday_insert(
    data: {
      branch: {id: $branchId}
      name: $name
      date: $date
      type: $type
      description: $description
      isPublicHoliday: $isPublicHoliday
      isSeeded: $isSeeded
      createdBy: {id: $createdById}
      updatedAt_expr: "request.time"
    }
  )
}

