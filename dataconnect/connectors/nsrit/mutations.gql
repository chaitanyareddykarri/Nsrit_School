# ── Attendance Correction (Coordinator / Principal) ───────────────────────────
# Bypasses the isLocked constraint — only coordinator/principal roles allowed.
# Writes an attendance_audit_logs record before updating the attendance row.
mutation CorrectAttendance(
  $id: UUID!
  $status: String!
  $editedById: UUID!
  $editedByRole: String!
  $previousStatus: String!
  $reason: String!
  $remarks: String
  $studentId: UUID!
  $sectionId: UUID!
  $attendanceDate: Date!
  $branchId: UUID!
  $academicYearId: UUID
) @auth(level: USER) @transaction {
  query @redact {
    # Non-MAIN_ADMIN callers must belong to the same branch as the attendance record.
    # Dual check: (1) caller's users.branchId == $branchId, (2) attendance record's branchId == $branchId.
    users(
      where: {
        _and: [
          {firebaseUID: {eq_expr: "auth.uid"}}
          {id: {eq: $editedById}}
          {isActive: {eq: true}}
          {
            _or: [
              {role: {in: ["MAIN_ADMIN", "main_admin"]}}
              {userRoles_on_user: {exist: {role: {in: ["MAIN_ADMIN", "main_admin"]}}}}
              {
                _and: [
                  {branchId: {eq: $branchId}}
                  {
                    _or: [
                      {role: {in: ["BRANCH_ADMIN", "branch_admin", "PRINCIPAL", "principal", "COORDINATOR", "coordinator"]}}
                      {userRoles_on_user: {exist: {role: {in: ["BRANCH_ADMIN", "branch_admin", "PRINCIPAL", "principal", "COORDINATOR", "coordinator"]}}}}
                    ]
                  }
                ]
              }
            ]
          }
        ]
      }
      limit: 1
    ) @check(expr: "this.exists(u, true)", message: "Attendance correction requires Coordinator or Principal role within the same branch") {
      id
      role
      branchId
    }
    # Confirm the attendance record actually belongs to the branch the caller claims
    attendanceRecord: attendances(
      where: {id: {eq: $id}, branchId: {eq: $branchId}}
      limit: 1
    ) @check(expr: "this.exists(a, true)", message: "Attendance record not found in the specified branch") {
      id
    }
  }
  attendance_update(
    id: $id
    data: {
      status: $status
      editedBy: {id: $editedById}
      remarks: $remarks
      editReason: $reason
      lastEditedAt_expr: "request.time"
      updatedAt_expr: "request.time"
    }
  )
  attendanceAuditLog_insert(
    data: {
      attendance: {id: $id}
      student: {id: $studentId}
      section: {id: $sectionId}
      branch: {id: $branchId}
      academicYear: {id: $academicYearId}
      attendanceDate: $attendanceDate
      editedBy: {id: $editedById}
      editedByRole: $editedByRole
      previousStatus: $previousStatus
      newStatus: $status
      reason: $reason
    }
  )
  auditLog_insert(
    data: {
      performedBy_expr: "response.query.users[0].id"
      performedRole_expr: "response.query.users[0].role"
      action: "ATTENDANCE_CORRECTED"
      entityType: "ATTENDANCE"
      branchId: $branchId
      oldData: $previousStatus
      newData: $status
    }
  )
}

# ── Attendance Summary Upsert ─────────────────────────────────────────────────
mutation UpsertAttendanceSummary(
  $studentId: UUID!
  $branchId: UUID!
  $sectionId: UUID!
  $academicYearId: UUID!
  $yearMonth: String!
  $totalWorkingDays: Int!
  $effectiveDays: Int!
  $presentCount: Int!
  $absentCount: Int!
  $halfDayCount: Int!
  $lateCount: Int!
  $medicalLeaveCount: Int!
  $approvedLeaveCount: Int!
  $holidayCount: Int!
  $sundayCount: Int!
  $attendancePct: Float!
  $academicYearPct: Float!
) @auth(level: USER) @transaction {
  query @redact {
    # Only staff roles may write attendance summaries.
    # Parents must never be able to manipulate their children's attendance percentages.
    callerStaff: users(
      where: {
        _and: [
          {firebaseUID: {eq_expr: "auth.uid"}}
          {isActive: {eq: true}}
          {
            _or: [
              {role: {in: ["MAIN_ADMIN", "main_admin", "BRANCH_ADMIN", "branch_admin", "PRINCIPAL", "principal", "COORDINATOR", "coordinator", "TEACHER", "teacher", "CLASS_TEACHER", "class_teacher"]}}
              {userRoles_on_user: {exist: {role: {in: ["MAIN_ADMIN", "main_admin", "BRANCH_ADMIN", "branch_admin", "PRINCIPAL", "principal", "COORDINATOR", "coordinator", "TEACHER", "teacher", "CLASS_TEACHER", "class_teacher"]}}}}
            ]
          }
        ]
      }
      limit: 1
    ) @check(expr: "this.exists(u, true)", message: "Staff role required to update attendance summaries") {
      id
      role
    }
  }
  attendanceSummary_upsert(
    data: {
      student: {id: $studentId}
      branch: {id: $branchId}
      section: {id: $sectionId}
      academicYear: {id: $academicYearId}
      yearMonth: $yearMonth
      totalWorkingDays: $totalWorkingDays
      effectiveDays: $effectiveDays
      presentCount: $presentCount
      absentCount: $absentCount
      halfDayCount: $halfDayCount
      lateCount: $lateCount
      medicalLeaveCount: $medicalLeaveCount
      approvedLeaveCount: $approvedLeaveCount
      holidayCount: $holidayCount
      sundayCount: $sundayCount
      attendancePct: $attendancePct
      academicYearPct: $academicYearPct
      lastRecalcAt_expr: "request.time"
    }
  )
}

