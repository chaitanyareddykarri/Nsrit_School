      where: {
        _and: [
          {firebaseUID: {eq_expr: "auth.uid"}}
          {isActive: {eq: true}}
          {
            _or: [
              {role: {in: ["MAIN_ADMIN", "main_admin"]}}
              {userRoles_on_user: {exist: {role: {in: ["MAIN_ADMIN", "main_admin"]}}}}
              # PRINCIPAL: branch must own this notice
              {branches_on_principal: {exist: {notices_on_branch: {exist: {id: {eq: $id}}}, isActive: {eq: true}}}}
            ]
          }
        ]
      }
      limit: 1
    ) @check(expr: "this.exists(u, true)", message: "Only the branch Principal or Main Admin can delete this notice") {
      id
      role
    }
  }
  notice_delete(id: $id)
}

