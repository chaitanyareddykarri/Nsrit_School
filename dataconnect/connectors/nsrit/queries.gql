      branchId: {eq: $branchId}
      attendanceDate: {ge: $fromDate, le: $toDate}
    }
    orderBy: {editedAt: DESC}
    limit: $limit
    offset: $offset
  ) {
    id
    attendanceId
    studentId
    sectionId
    attendanceDate
    editedById
    editedByRole
    previousStatus
    newStatus
    reason
    editedAt
    editedBy {
      id
      fullName
      role
    }
    student {
      id
      fullName
      studentId
    }
    section {
      id
      name
      academicClass {
        id
        name
      }
    }
  }
}

query GetAttendanceAuditLogBySection(
