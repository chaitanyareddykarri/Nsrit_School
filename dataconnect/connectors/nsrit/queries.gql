# ─── Marks Management & Result Publishing System ─────────────────────────────

query GetExamsByBranch(
  $branchId: UUID!
  $academicYearId: UUID!
  $limit: Int!
  $offset: Int!
) @auth(level: USER, insecureReason: "Read-only exam schedule; branchId scopes results to the caller's branch which is passed from the app session") {
  exams(
    where: {
      branchId: {eq: $branchId}
      academicYearId: {eq: $academicYearId}
      isActive: {eq: true}
    }
    orderBy: [{createdAt: DESC}]
    limit: $limit
    offset: $offset
  ) {
    id
    name
    examType
    status
    startDate
    endDate
    remarks
    createdAt
    updatedAt
    academicYear {
      id
      name
      startYear
    }
    examSections_on_exam {
      id
      sectionId
      isPublished
      section {
        id
        name
        academicClass {
          id
          name
        }
      }
    }
  }
}

query GetExamDetails($examId: UUID!) @auth(level: USER, insecureReason: "Read-only exam detail; all authenticated staff and students may view exam configurations") {
  exams(where: {id: {eq: $examId}, isActive: {eq: true}}, limit: 1) {
    id
    name
    examType
    status
    startDate
    endDate
    remarks
    branchId
    academicYearId
    createdAt
    updatedAt
    createdBy {
      id
      fullName
    }
    academicYear {
      id
      name
      startYear
    }
    examSections_on_exam {
      id
      sectionId
      academicClassId
      isPublished
      publishedAt
      publishedBy {
        id
        fullName
      }
      section {
        id
        name
        academicClass {
          id
          name
        }
      }
    }
    examSubjectConfigs_on_exam {
      subjectName
      maxMarks
      passingMarks
      academicClassId
    }
  }
}

query GetMarksForSection(
  $examId: UUID!
  $sectionId: UUID!
) @auth(level: USER, insecureReason: "Read-only marks data; examId and sectionId scope results; access controlled in the app session by role") {
  students(
    where: {sectionId: {eq: $sectionId}, isActive: {eq: true}, status: {eq: "ACTIVE"}}
    orderBy: [{rollNumber: ASC}, {fullName: ASC}]
    limit: 200
    offset: 0
  ) {
    id
    studentId
    fullName
    rollNumber
    examMarks: studentMarks_on_student(where: {examId: {eq: $examId}}) {
      subjectName
      marksObtained
      isAbsent
      updatedAt
    }
  }
  examSubjectConfigs(
    where: {examId: {eq: $examId}}
    orderBy: [{subjectName: ASC}]
    limit: 50
    offset: 0
  ) {
    subjectName
    maxMarks
    passingMarks
    academicClassId
  }
  examSections(
    where: {examId: {eq: $examId}, sectionId: {eq: $sectionId}}
    limit: 1
  ) {
    id
    isPublished
    publishedAt
  }
}

# Parent-safe: only returns published results for a specific student.
query GetStudentResultsForParent(
  $studentId: UUID!
  $academicYearId: UUID!
) @auth(level: USER, insecureReason: "Read-only exam results; parent-student access enforced in the app session via parentService.assertParentStudentAccess") {
  examSections(
    where: {
      isPublished: {eq: true}
      section: {students_on_section: {exist: {id: {eq: $studentId}, isActive: {eq: true}}}}
    }
    orderBy: [{publishedAt: DESC}]
    limit: 50
    offset: 0
  ) {
    id
    isPublished
    publishedAt
    exam {
      id
      name
      examType
      startDate
      endDate
      academicYearId
    }
    section {
      id
      name
      academicClass {
        id
        name
      }
    }
  }
}

query GetStudentResultDetail(
  $examId: UUID!
  $studentId: UUID!
) @auth(level: USER, insecureReason: "Read-only individual student result; studentId and examId scope the result; parent-student access enforced in the app session") {
  studentMarks(
    where: {examId: {eq: $examId}, studentId: {eq: $studentId}}
    orderBy: [{subjectName: ASC}]
    limit: 50
    offset: 0
  ) {
    subjectName
    marksObtained
    isAbsent
    updatedAt
    student {
      id
      fullName
      studentId
      rollNumber
      section {
        id
        name
        academicClass {
          id
          name
        }
      }
    }
  }
  examSubjectConfigs(
    where: {examId: {eq: $examId}}
    orderBy: [{subjectName: ASC}]
    limit: 50
    offset: 0
  ) {
    subjectName
    maxMarks
    passingMarks
  }
  exams(where: {id: {eq: $examId}}, limit: 1) {
    id
    name
    examType
    startDate
    endDate
    branchId
    academicYear {
      id
      name
      startYear
    }
  }
}

query GetExamAnalytics(
  $examId: UUID!
  $sectionId: UUID!
) @auth(level: USER, insecureReason: "Read-only marks analytics; examId and sectionId scope results; all staff may view their section's analytics") {
  studentMarks(
    where: {examId: {eq: $examId}, sectionId: {eq: $sectionId}}
    limit: 500
    offset: 0
  ) {
    studentId
    subjectName
    marksObtained
    isAbsent
  }
  examSubjectConfigs(
    where: {examId: {eq: $examId}}
    orderBy: [{subjectName: ASC}]
    limit: 50
    offset: 0
  ) {
    subjectName
    maxMarks
    passingMarks
  }
  students(
    where: {sectionId: {eq: $sectionId}, isActive: {eq: true}, status: {eq: "ACTIVE"}}
    limit: 200
    offset: 0
  ) {
    id
    fullName
    studentId
    rollNumber
  }
}

query GetPublishedExamsForSection(
  $sectionId: UUID!
  $academicYearId: UUID!
) @auth(level: USER, insecureReason: "Read-only published exam schedule for a section; sectionId scoping limits visible data") {
  examSections(
    where: {
      sectionId: {eq: $sectionId}
      isPublished: {eq: true}
      exam: {academicYearId: {eq: $academicYearId}, isActive: {eq: true}}
    }
    orderBy: [{publishedAt: DESC}]
    limit: 50
    offset: 0
  ) {
    id
    isPublished
    publishedAt
    exam {
      id
      name
      examType
      startDate
      endDate
    }
  }
}

query GetExamsBySection(
  $sectionId: UUID!
  $academicYearId: UUID!
) @auth(level: USER, insecureReason: "Read-only exam list for a section; sectionId and academicYearId scope results to a specific class") {
  examSections(
    where: {
      sectionId: {eq: $sectionId}
      exam: {academicYearId: {eq: $academicYearId}, isActive: {eq: true}}
    }
    orderBy: [{createdAt: DESC}]
    limit: 50
    offset: 0
  ) {
    id
    isPublished
    publishedAt
    exam {
      id
      name
      examType
      status
      startDate
      endDate
      remarks
      examSubjectConfigs_on_exam {
        subjectName
        maxMarks
        passingMarks
        academicClassId
      }
    }
  }
}
