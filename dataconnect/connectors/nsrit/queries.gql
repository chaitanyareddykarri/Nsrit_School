# ── Attendance Summary ────────────────────────────────────────────────────────
query GetAttendanceSummaryByStudent(
  $studentId: UUID!
  $academicYearId: UUID!
) @auth(level: USER) {
  attendanceSummaries(
    where: {
      studentId: {eq: $studentId}
      academicYearId: {eq: $academicYearId}
    }
    orderBy: {yearMonth: ASC}
  ) {
    studentId
    branchId
    sectionId
    academicYearId
    yearMonth
    totalWorkingDays
    effectiveDays
    presentCount
    absentCount
    halfDayCount
    lateCount
    medicalLeaveCount
    approvedLeaveCount
    holidayCount
    sundayCount
    attendancePct
    academicYearPct
    lastRecalcAt
  }
}

query GetAttendanceSummaryBySection(
  $sectionId: UUID!
  $yearMonth: String!
) @auth(level: USER) {
  attendanceSummaries(
    where: {
      sectionId: {eq: $sectionId}
      yearMonth: {eq: $yearMonth}
    }
    orderBy: {attendancePct: ASC}
    limit: 500
  ) {
    studentId
    attendancePct
    academicYearPct
    presentCount
    absentCount
    halfDayCount
    lateCount
    medicalLeaveCount
    approvedLeaveCount
    effectiveDays
    yearMonth
    student {
      id
      fullName
      studentId
    }
  }
}

query GetLowAttendanceStudents(
  $branchId: UUID!
  $academicYearId: UUID!
  $thresholdPct: Float!
  $yearMonth: String
) @auth(level: USER) {
  attendanceSummaries(
    where: {
      branchId: {eq: $branchId}
      academicYearId: {eq: $academicYearId}
      attendancePct: {le: $thresholdPct}
      yearMonth: {eq: $yearMonth}
    }
    orderBy: {attendancePct: ASC}
    limit: 500
  ) {
    studentId
    sectionId
    yearMonth
    attendancePct
    academicYearPct
    presentCount
    absentCount
    effectiveDays
    student {
      id
      fullName
      studentId
      academicClass {
        id
        name
      }
      section {
        id
        name
      }
    }
  }
}

