# Branch-wide payment history. Per-student history is served separately via
# GetStudentFeeProfile, so this query never needs a studentId predicate — the
# previous `studentId: {eq: $studentId}` (always null here) translated to SQL
# `studentId = NULL` and returned zero rows. Year scoping is applied client-side
# in feeService from the selected `academicYear` field below.
query GetPaymentHistory(
  $branchId: UUID!
  $fromDate: Date
  $toDate: Date
  $limit: Int = 200
  $offset: Int = 0
) @auth(level: USER) {
  currentUser: users(
    where: {
      _and: [
        {firebaseUID: {eq_expr: "auth.uid"}}
        {isActive: {eq: true}}
      ]
    }
    limit: 1
  ) @redact @check(expr: "this.exists(u, u.role == 'MAIN_ADMIN' || u.role == 'main_admin' || u.branchId == vars.branchId || u.role == 'ACCOUNTANT' || u.role == 'accountant')", message: "Payment history access required") {
    id
    role
    branchId
  }
  feePayments(
    where: {
      student: {branchId: {eq: $branchId}}
      paymentDate: {ge: $fromDate, le: $toDate}
    }
    orderBy: {paymentDate: DESC}
    limit: $limit
    offset: $offset
  ) {
    id
    studentId
    feePlanId
    amount
    academicYear
    paymentDate
    paymentMode
    referenceNumber
    receiptNumber
    status
    reversedAt
    reverseReason
    remarks
    student {
      id
      studentId
      fullName
      academicClass {
        id
        name
        wing {
          id
          code
          name
        }
      }
      section {
        id
        name
      }
      branch {
        id
        name
        branchCode
      }
    }
    collectedBy {
      id
      fullName
    }
    reversedBy {
      id
      fullName
    }
  }
}

