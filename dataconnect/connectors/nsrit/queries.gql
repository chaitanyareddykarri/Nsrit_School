    branchCode
    address
    city
    state
    pincode
    phone
    email
    status
    branchAdminId
    principalId
    createdAt
    updatedAt
    branchAdmin {
      id
      fullName
      phoneNumber
      role
      isActive
      roles: userRoles_on_user {
        role
      }
    }
    principal {
      id
      fullName
      phoneNumber
      role
      isActive
    }
    isActive
    branchTeachers: teachers_on_branch(where: {isActive: {eq: true}}, limit: 500) {
      id
