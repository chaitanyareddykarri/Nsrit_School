# ─── Broadcast Notification Helpers ─────────────────────────────────────────

# Returns teacher/staff userIds in a branch for bulk notification dispatch
query GetBranchStaffUserIds($branchId: UUID!, $limit: Int = 500) @auth(level: USER, insecureReason: "Access is gated by application-level RBAC; only authenticated branch staff invoke this for broadcast notifications") {
  users(
    where: {
      _and: [
        {branchId: {eq: $branchId}}
        {isActive: {eq: true}}
        {_or: [
          {role: {eq: "TEACHER"}}
          {role: {eq: "CLASS_TEACHER"}}
          {role: {eq: "COORDINATOR"}}
        ]}
      ]
    }
    limit: $limit
  ) {
    id
  }
}

# Returns student records with linked parent userIds for bulk notification dispatch
query GetBranchStudentsWithParents($branchId: UUID!, $limit: Int = 1000) @auth(level: USER, insecureReason: "Access is gated by application-level RBAC; only authenticated branch staff invoke this for broadcast notifications") {
  students(
    where: {branchId: {eq: $branchId}, isActive: {eq: true}}
    limit: $limit
  ) {
    id
    linkedParents: studentParents_on_student {
      userId
    }
  }
}

