query GetSections($branchId: UUID!, $academicYear: Int!, $limit: Int = 100, $offset: Int = 0) @auth(level: USER)
  @refresh(onMutationExecuted: {operation: "AssignTeacherClassTeacher"})
  @refresh(onMutationExecuted: {operation: "UpdateClassTeacherAssignment"})
  @refresh(onMutationExecuted: {operation: "RemoveClassTeacherAssignment"})
  @refresh(onMutationExecuted: {operation: "RemoveLegacyClassTeacherAssignment"}) {
  currentUser: users(
    where: {
      _and: [
        {firebaseUID: {eq_expr: "auth.uid"}}
        {isActive: {eq: true}}
        {
          _or: [
            {branchId: {eq: $branchId}}
            {role: {in: ["MAIN_ADMIN", "main_admin"]}}
            {userRoles_on_user: {exist: {role: {in: ["MAIN_ADMIN", "main_admin"]}}}}
            {branches_on_principal: {exist: {id: {eq: $branchId}, isActive: {eq: true}}}}
            {branches_on_branchAdmin: {exist: {id: {eq: $branchId}, isActive: {eq: true}}}}
            {coordinators_on_user: {exist: {branchId: {eq: $branchId}, isActive: {eq: true}}}}
          ]
        }
      ]
    }
    limit: 1
  ) @redact @check(expr: "this.exists(u, true)", message: "Branch access required") {
    id
    role
    branchId
  }
  sections(
    where: {branchId: {eq: $branchId}, academicYear: {eq: $academicYear}, isActive: {eq: true}}
    limit: $limit
    offset: $offset
  ) {
    id
    branchId
    wingId
    academicClassId
    name
    academicYear
    classTeacherId
    isActive
    academicClass {
      id
      name
      sortOrder
      wingId
      wing {
        id
        code
        name
      }
    }
    classTeacher {
      id
      fullName
      phoneNumber
      employeeId
      staffType
      role
      roles: userRoles_on_user {
        role
      }
      teacherProfile: teacher_on_user {
        id
        userId
        employeeId
        staffType
        branchId
        isActive
      }
    }
    classTeacherAssignments: teacherSectionAssignments_on_section(
      where: {isClassTeacher: {eq: true}, isActive: {eq: true}}
      limit: 1
    ) {
      id
      teacherId
      sectionId
      createdAt
      updatedAt
      assignedBy {
        id
        fullName
        role
      }
      teacher {
        id
        employeeId
        staffType
        user {
          id
          fullName
          phoneNumber
          employeeId
          role
          roles: userRoles_on_user {
            role
          }
        }
      }
    }
  }
  students(where: {branchId: {eq: $branchId}, status: {eq: "ACTIVE"}}, limit: 1000) {
    id
    sectionId
  }
  attendances(where: {section: {branchId: {eq: $branchId}}}, limit: 1000) {
    id
    sectionId
    status
  }
}

