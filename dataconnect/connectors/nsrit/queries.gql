# ── Attendance Audit Log ──────────────────────────────────────────────────────
query GetAttendanceAuditLog(
  $attendanceId: UUID!
) @auth(level: USER) {
  attendanceAuditLogs(
    where: {attendanceId: {eq: $attendanceId}}
    orderBy: {editedAt: DESC}
  ) {
    id
    attendanceId
    studentId
    sectionId
    branchId
    attendanceDate
    editedById
    editedByRole
    previousStatus
    newStatus
    reason
    editedAt
    editedBy {
      id
      fullName
      role
    }
  }
}

query GetAttendanceAuditLogByBranch(
