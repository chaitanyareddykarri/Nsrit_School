# Used by ChangeUserRoleScreen (MAIN_ADMIN only).
# Returns the user record including current users.role and all user_roles rows
# so the admin can see exactly what the DB contains before making a change.
query GetUserForRoleChange($phoneNumber: String!) @auth(level: USER) {
  caller: users(
    where: {firebaseUID: {eq_expr: "auth.uid"}, isActive: {eq: true}}
    limit: 1
  ) @redact @check(expr: "this.exists(u, u.role == 'MAIN_ADMIN')", message: "Main Admin only") {
    id
    role
  }
  users(where: {phoneNumber: {eq: $phoneNumber}, isActive: {eq: true}}, limit: 1) {
    id
    fullName
    phoneNumber
    role
    branchId
    isActive
    branch {
      id
      name
      branchCode
    }
    userRoles_on_user {
      id
      role
      createdAt
    }
  }
}

# ── Academic Year queries ─────────────────────────────────────────────────────

query GetAcademicYears($branchId: UUID!, $limit: Int = 20) @auth(level: USER) {
  currentUser: users(
    where: {firebaseUID: {eq_expr: "auth.uid"}, isActive: {eq: true}}
    limit: 1
  ) @redact @check(expr: "this.exists(u, u.role == 'PRINCIPAL' || u.role == 'COORDINATOR' || u.role == 'MAIN_ADMIN')", message: "Principal or Coordinator only") {
    id
    role
  }
  academicYears(
    where: {branchId: {eq: $branchId}}
    orderBy: {startYear: DESC}
    limit: $limit
  ) {
    id
    branchId
    name
    startYear
    startDate
    endDate
    status
    isActive
    createdAt
    updatedAt
  }
}

query GetActiveAcademicYear($branchId: UUID!) @auth(level: USER) {
  currentUser: users(
    where: {firebaseUID: {eq_expr: "auth.uid"}, isActive: {eq: true}}
    limit: 1
  ) @redact @check(expr: "this.exists(u, u.role == 'PRINCIPAL' || u.role == 'COORDINATOR' || u.role == 'MAIN_ADMIN')", message: "Principal or Coordinator only") {
    id
    role
  }
  academicYears(
    where: {branchId: {eq: $branchId}, isActive: {eq: true}}
    limit: 1
  ) {
    id
    branchId
    name
    startYear
    startDate
    endDate
    status
    isActive
  }
}

query GetBranchPromotionHistory($branchId: UUID!, $academicYear: Int, $limit: Int = 100) @auth(level: USER) {
  currentUser: users(
    where: {firebaseUID: {eq_expr: "auth.uid"}, isActive: {eq: true}}
    limit: 1
  ) @redact @check(expr: "this.exists(u, u.role == 'PRINCIPAL' || u.role == 'COORDINATOR' || u.role == 'MAIN_ADMIN')", message: "Principal or Coordinator only") {
    id
    role
  }
  studentPromotionHistories(
    where: {
      branchId: {eq: $branchId}
      academicYear: {eq: $academicYear}
    }
    orderBy: {promotedAt: DESC}
    limit: $limit
  ) {
    id
    promotionStatus
    academicYear
    promotedAt
    remarks
    student {
      id
      fullName
      studentId
    }
    fromClass {
      id
      name
    }
    toClass {
      id
      name
    }
    fromSection {
      id
      name
    }
    toSection {
      id
      name
    }
    promotedBy {
      id
      fullName
    }
  }
}

# ── Holiday Queries ──────────────────────────────────────────────────────────

query GetHolidaysByBranch(
  $branchId: UUID!
  $fromDate: Date!
  $toDate: Date!
) @auth(level: USER) {
  holidays(
    where: {
      branchId: {eq: $branchId}
      date: {ge: $fromDate, le: $toDate}
    }
    orderBy: {date: ASC}
  ) {
    id
    name
    date
    type
    description
    isPublicHoliday
    isSeeded
    createdById
    createdAt
