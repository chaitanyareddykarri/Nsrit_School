query GetCurrentUser($firebaseUID: String!) @auth(level: USER) {
  # Security: verify the caller owns the requested UID — prevents IDOR profile enumeration.
  # MAIN_ADMIN bypass is intentional so admin tools can look up any user.
  _ownership: users(
    where: {firebaseUID: {eq_expr: "auth.uid"}, isActive: {eq: true}}
    limit: 1
  ) @redact
    @check(
      expr: "this.exists(u, u.firebaseUID == vars.firebaseUID || u.role == 'MAIN_ADMIN' || u.role == 'main_admin')",
      message: "You can only fetch your own profile"
    ) {
    id
    firebaseUID
    role
  }
  users(where: {firebaseUID: {eq: $firebaseUID}, isActive: {eq: true}}, limit: 1) {
    id
    firebaseUID
    fullName
    countryCode
    phoneNumber
    status
    role
    employeeId
    staffType
    branchId
    wingId
    branch {
      id
      branchCode
      name
    }
    branchAdminBranches: branches_on_branchAdmin {
      id
      branchCode
      name
    }
    principalBranches: branches_on_principal {
      id
      branchCode
      name
    }
    coordinatorProfiles: coordinators_on_user {
      id
      branchId
      wing
    }
    teacherProfile: teacher_on_user {
      id
      branchId
    }
    accountantProfile: accountant_on_user {
      id
      branchId
    }
    roles: userRoles_on_user {
      id
      role
      createdAt
    }
    isActive
  }
}

query GetUserByPhone($phoneNumber: String!) @auth(level: USER) {
  currentUser: users(
    where: {firebaseUID: {eq_expr: "auth.uid"}, isActive: {eq: true}}
    limit: 1
  ) @redact {
    id
  }
  # Minimum fields needed for the account-claim flow.
  # Full profile (role, branchId, assignments) is fetched via GetCurrentUser after claiming.
  # fullName is intentionally omitted: returning it would allow any authenticated user
  # to enumerate staff/parent names by phone number (M-1 phone enumeration fix).
  users(where: {phoneNumber: {eq: $phoneNumber}, isActive: {eq: true}}, limit: 1) {
    id
    firebaseUID
    countryCode @retired
    phoneNumber
    status @retired
    role @retired
    employeeId @retired
    staffType @retired
    branchId @retired
    wingId @retired
    branch @retired {
      id
      branchCode
      name
    }
    branchAdminBranches: branches_on_branchAdmin @retired {
      id
      branchCode
      name
    }
    principalBranches: branches_on_principal @retired {
      id
      branchCode
      name
    }
    coordinatorProfiles: coordinators_on_user @retired {
      id
      branchId
      wing
    }
    teacherProfile: teacher_on_user @retired {
      id
      branchId
    }
    accountantProfile: accountant_on_user @retired {
      id
      branchId
    }
    roles: userRoles_on_user @retired {
      id
      role
      createdAt
    }
    isActive
  }
}

query GetUserRoles($userId: UUID!) @auth(level: USER) {
  currentUser: users(
    where: {firebaseUID: {eq_expr: "auth.uid"}, isActive: {eq: true}}
    limit: 1
  ) @redact @check(expr: "this.exists(u, u.id == vars.userId || u.role == 'MAIN_ADMIN' || u.role == 'main_admin')", message: "User role access denied") {
    id
    role
  }
  userRoles(where: {userId: {eq: $userId}}, orderBy: {createdAt: ASC}) {
    id
    userId
    role
    createdAt
  }
}

query GetStudentsByBranch($branchId: UUID!, $limit: Int = 50, $offset: Int = 0) @auth(level: USER) {
  # Teachers and Parents must not access the full branch student roster.
  # Restricted to MAIN_ADMIN (any branch) and leadership roles in the matching branch.
  currentUser: users(
    where: {firebaseUID: {eq_expr: "auth.uid"}, isActive: {eq: true}}
    limit: 1
  ) @redact @check(expr: "this.exists(u, u.role == 'MAIN_ADMIN' || u.role == 'main_admin' || (u.branchId == vars.branchId && (u.role == 'PRINCIPAL' || u.role == 'principal' || u.role == 'BRANCH_ADMIN' || u.role == 'branch_admin' || u.role == 'COORDINATOR' || u.role == 'coordinator' || u.role == 'ACCOUNTANT' || u.role == 'accountant')))", message: "Branch leadership role required") {
    id
    role
    branchId
  }
  students(
    where: {branchId: {eq: $branchId}, isActive: {eq: true}, status: {eq: "ACTIVE"}}
    limit: $limit
    offset: $offset
  ) {
    id
    studentId
    admissionYear
    branchCode
    serialNumber
    fullName
    gender
    dateOfBirth
    branchId
    wingId
    academicClassId
    sectionId
    parentId
    phoneNumber
    address
    admissionDate
    status
    isActive
  }
}

query GetStudentsBySection($sectionId: UUID!, $limit: Int = 50, $offset: Int = 0) @auth(level: USER) {
  # Access control: staff only. Teacher must be assigned to this section; branch-level
  # roles (Principal, Coordinator, BranchAdmin) may access any section in their branch;
  # MAIN_ADMIN has unrestricted access. Parents are NOT permitted.
  sectionAccess: users(
    where: {
      _and: [
        {firebaseUID: {eq_expr: "auth.uid"}}
        {isActive: {eq: true}}
        {
          _or: [
            {role: {in: ["MAIN_ADMIN", "main_admin"]}}
            {userRoles_on_user: {exist: {role: {in: ["MAIN_ADMIN", "main_admin"]}}}}
            # Teachers assigned to this specific section (User → Teacher → TeacherSectionAssignment)
            {teacher_on_user: {teacherSectionAssignments_on_teacher: {exist: {sectionId: {eq: $sectionId}, isActive: {eq: true}}}}}
            # Class teacher of this section (Section.classTeacher → User reverse relation)
            {sections_on_classTeacher: {exist: {id: {eq: $sectionId}, isActive: {eq: true}}}}
            # Branch-level leadership (PRINCIPAL, BRANCH_ADMIN, COORDINATOR, ACCOUNTANT)
            {role: {in: ["PRINCIPAL", "principal", "BRANCH_ADMIN", "branch_admin", "COORDINATOR", "coordinator", "ACCOUNTANT", "accountant"]}}
            {userRoles_on_user: {exist: {role: {in: ["PRINCIPAL", "principal", "BRANCH_ADMIN", "branch_admin", "COORDINATOR", "coordinator", "ACCOUNTANT", "accountant"]}}}}
          ]
        }
      ]
    }
    limit: 1
  ) @redact @check(expr: "this.exists(u, true)", message: "Access to this section's students is denied") {
    id
    role
  }
  students(
    where: {sectionId: {eq: $sectionId}, isActive: {eq: true}, status: {eq: "ACTIVE"}}
    orderBy: {fullName: ASC}
    limit: $limit
    offset: $offset
  ) {
    id
    studentId
    fullName
    gender
    dateOfBirth
    branchId
    academicClassId
    sectionId
    parentId
    phoneNumber
    admissionDate
    status
    isActive
    academicClass {
      id
      name
      wing {
        id
        code
        name
      }
    }
    section {
      id
      name
      academicYear
      classTeacher {
        id
        fullName
        phoneNumber
      }
    }
    parent {
      id
      userId
      fullName
      fatherName
      motherName
      phoneNumber
    }
  }
}

