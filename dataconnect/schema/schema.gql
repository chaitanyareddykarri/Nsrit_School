# NSRIT Connect relational schema for Firebase Data Connect / SQL Connect.
# Roles and statuses are stored as strings because Data Connect table fields are
# safest across generated SDKs when represented as varchar values.

type Branch @table(name: "branches", key: "id") @unique(fields: ["branchCode"]) {
  id: UUID! @default(expr: "uuidV4()")
  name: String! @col(dataType: "varchar(120)")
  branchCode: String! @col(dataType: "varchar(2)")
  address: String
  city: String @col(dataType: "varchar(80)")
  state: String @col(dataType: "varchar(80)")
  pincode: String @col(dataType: "varchar(12)")
  phone: String @col(dataType: "varchar(20)")
  email: String @col(dataType: "varchar(140)")
  status: String! @col(dataType: "varchar(20)") @default(value: "ACTIVE")
  branchAdmin: User
  principal: User
  isActive: Boolean! @default(value: true)
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

extend type Branch {
  branchAdminId: UUID
  principalId: UUID
}

type Wing @table(name: "wings", key: "id") @unique(fields: ["branch", "code"]) {
  id: UUID! @default(expr: "uuidV4()")
  branch: Branch!
  name: String! @col(dataType: "varchar(80)")
  code: String! @col(dataType: "varchar(20)")
  isActive: Boolean! @default(value: true)
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

extend type Wing {
  branchId: UUID!
}

type AcademicClass @table(name: "academic_classes", key: "id") @unique(fields: ["branch", "name"]) @index(fields: ["wingId", "sortOrder"]) {
  id: UUID! @default(expr: "uuidV4()")
  branch: Branch!
  name: String! @col(dataType: "varchar(20)")
  classCode: String @col(name: "class_code", dataType: "varchar(20)")
  wing: Wing!
  sortOrder: Int! @col(name: "sort_order") @default(value: 0)
  displayOrder: Int @default(value: 0)
  isActive: Boolean! @default(value: true)
  activatedBy: User
  activatedAt: Timestamp @col(name: "activated_at")
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

extend type AcademicClass {
  branchId: UUID!
  wingId: UUID!
  activatedById: UUID
}

type Section @table(name: "sections", key: "id") @unique(fields: ["branch", "academicClass", "name", "academicYear"]) @index(fields: ["branchId", "academicClassId", "academicYear"]) {
  id: UUID! @default(expr: "uuidV4()")
  branch: Branch!
  wing: Wing!
  academicClass: AcademicClass!
  name: String! @col(dataType: "varchar(1)")
  academicYear: Int! @col(name: "academic_year")
  classTeacher: User
  isActive: Boolean! @default(value: true)
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

extend type Section {
  branchId: UUID!
  wingId: UUID!
  academicClassId: UUID!
  classTeacherId: UUID
}

type Coordinator @table(name: "coordinators", key: "id") @index(fields: ["branchId", "wing"]) {
  id: UUID! @default(expr: "uuidV4()")
  user: User!
  branch: Branch!
  wing: String! @col(dataType: "varchar(20)")
  employeeId: String @col(name: "employee_id", dataType: "varchar(40)") @unique
  staffType: String @col(name: "staff_type", dataType: "varchar(20)")
  gender: String @col(dataType: "varchar(20)")
  email: String @col(dataType: "varchar(140)")
  isActive: Boolean! @default(value: true)
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

extend type Coordinator {
  userId: UUID!
  branchId: UUID!
}

type User @table(name: "users", key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  firebaseUID: String! @col(dataType: "varchar(128)")
  fullName: String! @col(dataType: "varchar(140)")
  countryCode: String! @col(dataType: "varchar(5)")
  phoneNumber: String! @col(dataType: "varchar(20)")
  status: String! @col(dataType: "varchar(20)") @default(value: "ACTIVE")
  # Legacy rollout field. New authorization and switching logic should read UserRole.
  role: String! @col(dataType: "varchar(30)")
  employeeId: String @col(name: "employee_id", dataType: "varchar(40)") @unique
  staffType: String @col(name: "staff_type", dataType: "varchar(20)")
  branch: Branch
  wing: Wing
  isActive: Boolean! @default(value: true)
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

extend type User {
  branchId: UUID
  wingId: UUID
}

type UserRole @table(name: "user_roles", key: ["user", "role"]) @index(fields: ["userId", "role"]) {
  id: UUID! @default(expr: "uuidV4()")
  user: User!
  role: String! @col(dataType: "varchar(30)")
  createdAt: Timestamp! @col(name: "created_at") @default(expr: "request.time")
}

extend type UserRole {
  userId: UUID!
}

type Parent @table(name: "parents", key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  user: User
  branch: Branch!
  fullName: String! @col(dataType: "varchar(140)")
  fatherName: String @col(dataType: "varchar(140)")
  motherName: String @col(dataType: "varchar(140)")
  countryCode: String! @col(dataType: "varchar(5)")
  phoneNumber: String! @col(dataType: "varchar(20)")
  email: String @col(dataType: "varchar(140)")
  address: String
  isActive: Boolean! @default(value: true)
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

extend type Parent {
  userId: UUID
  branchId: UUID!
}

type StudentIdSequence
  @table(name: "student_id_sequences", key: ["admissionYear", "branchCode"]) {
  admissionYear: Int!
  branchCode: String! @col(dataType: "varchar(2)")
  lastSerialNumber: Int! @default(value: 0)
  updatedAt: Timestamp! @default(expr: "request.time")
}

type StudentSequence
  @table(name: "student_sequences", key: ["year", "branchCode"]) {
  year: Int!
  branchCode: String! @col(name: "branch_code", dataType: "varchar(2)")
  lastSerial: Int! @col(name: "last_serial") @default(value: 0)
  updatedAt: Timestamp! @default(expr: "request.time")
}

type StaffIdSequence
  @table(name: "staff_id_sequences", key: ["joiningYear", "branchCode", "staffType"]) {
  joiningYear: Int!
  branchCode: String! @col(dataType: "varchar(2)")
  staffType: String! @col(name: "staff_type", dataType: "varchar(20)")
  lastSerialNumber: Int! @default(value: 0)
  updatedAt: Timestamp! @default(expr: "request.time")
}

type EmployeeSequence
  @table(name: "employee_sequences", key: ["year", "branchCode", "staffType"]) {
  year: Int!
  branchCode: String! @col(name: "branch_code", dataType: "varchar(2)")
  staffType: String! @col(name: "staff_type", dataType: "varchar(20)")
  lastSequence: Int! @col(name: "last_sequence") @default(value: 0)
  updatedAt: Timestamp! @default(expr: "request.time")
}

type Teacher @table(name: "teachers", key: "id") @unique(fields: ["user"]) @index(fields: ["branchId"]) {
  id: UUID! @default(expr: "uuidV4()")
  user: User!
  employeeId: String! @col(name: "employee_id", dataType: "varchar(40)") @unique
  staffType: String! @col(name: "staff_type", dataType: "varchar(20)") @default(value: "TEACHING")
  branch: Branch!
  # Deprecated: teachers are branch-level resources. Keep nullable for safe migration.
  wing: String @col(dataType: "varchar(20)")
  joiningDate: Date! @col(name: "joining_date")
  designation: String! @col(dataType: "varchar(80)")
  gender: String! @col(dataType: "varchar(20)")
  alternateMobileNumber: String @col(name: "alternate_mobile_number", dataType: "varchar(20)")
  email: String @col(dataType: "varchar(140)")
  dateOfBirth: Date @col(name: "date_of_birth")
  qualification: String @col(dataType: "varchar(140)")
  experience: String @col(dataType: "varchar(80)")
  address: String
  city: String @col(dataType: "varchar(80)")
  state: String @col(dataType: "varchar(80)")
  pincode: String @col(dataType: "varchar(12)")
  emergencyContact: String @col(name: "emergency_contact", dataType: "varchar(20)")
  bloodGroup: String @col(name: "blood_group", dataType: "varchar(10)")
  isActive: Boolean! @default(value: true)
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

extend type Teacher {
  userId: UUID!
  branchId: UUID!
}

type Accountant @table(name: "accountants", key: "id") @unique(fields: ["user"]) @index(fields: ["branchId"]) {
  id: UUID! @default(expr: "uuidV4()")
  user: User!
  employeeId: String! @col(name: "employee_id", dataType: "varchar(40)") @unique
  staffType: String! @col(name: "staff_type", dataType: "varchar(20)") @default(value: "SUPPORTING")
  branch: Branch!
  joiningDate: Date! @col(name: "joining_date")
  designation: String! @col(dataType: "varchar(80)")
  gender: String! @col(dataType: "varchar(20)")
  email: String @col(dataType: "varchar(140)")
  qualification: String @col(dataType: "varchar(140)")
  experience: String @col(dataType: "varchar(80)")
  address: String
  city: String @col(dataType: "varchar(80)")
  state: String @col(dataType: "varchar(80)")
  pincode: String @col(dataType: "varchar(12)")
  emergencyContact: String @col(name: "emergency_contact", dataType: "varchar(20)")
  bloodGroup: String @col(name: "blood_group", dataType: "varchar(10)")
  isActive: Boolean! @default(value: true)
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

extend type Accountant {
  userId: UUID!
  branchId: UUID!
}

type Subject @table(name: "subjects", key: "id") @unique(fields: ["code"]) @index(fields: ["status"]) {
  id: UUID! @default(expr: "uuidV4()")
  name: String! @col(dataType: "varchar(120)")
  code: String! @col(dataType: "varchar(30)")
  status: String! @col(dataType: "varchar(20)") @default(value: "ACTIVE")
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

type TeacherSubject @table(name: "teacher_subjects", key: "id") @unique(fields: ["teacher", "subject"]) @index(fields: ["teacherId"]) {
  id: UUID! @default(expr: "uuidV4()")
  teacher: Teacher!
  subject: Subject!
  createdAt: Timestamp! @default(expr: "request.time")
}

extend type TeacherSubject {
  teacherId: UUID!
  subjectId: UUID!
}

type TeacherSectionAssignment @table(name: "teacher_section_assignments", key: "id") @unique(fields: ["teacher", "section", "isClassTeacher"]) @index(fields: ["sectionId", "isClassTeacher"]) {
  id: UUID! @default(expr: "uuidV4()")
  teacher: Teacher!
  section: Section!
  assignedBy: User
  isClassTeacher: Boolean! @col(name: "is_class_teacher") @default(value: false)
  isActive: Boolean! @default(value: true)
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

extend type TeacherSectionAssignment {
  teacherId: UUID!
  sectionId: UUID!
  assignedById: UUID
}

type TeacherTransferHistory @table(name: "teacher_transfer_history", key: "id") @index(fields: ["teacherId", "changedAt"]) {
  id: UUID! @default(expr: "uuidV4()")
  teacher: Teacher!
  oldWing: String! @col(name: "old_wing", dataType: "varchar(20)")
  newWing: String! @col(name: "new_wing", dataType: "varchar(20)")
  changedBy: User!
  changedAt: Timestamp! @col(name: "changed_at") @default(expr: "request.time")
}

extend type TeacherTransferHistory {
  teacherId: UUID!
  changedById: UUID!
}

type Student @table(name: "students", key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  studentId: String! @col(dataType: "varchar(10)") @unique
  admissionYear: Int!
  branchCode: String! @col(dataType: "varchar(2)")
  serialNumber: Int!
  fullName: String! @col(dataType: "varchar(140)")
  gender: String @col(dataType: "varchar(20)")
  dateOfBirth: Date
  photoUrl: String
  aadhaarNumber: String @col(name: "aadhaar_number", dataType: "varchar(20)")
  bloodGroup: String @col(dataType: "varchar(10)")
  branch: Branch!
  wing: Wing
  academicClass: AcademicClass!
  section: Section!
  parent: Parent!
  rollNumber: String @col(dataType: "varchar(30)")
  countryCode: String @col(dataType: "varchar(5)")
  phoneNumber: String @col(dataType: "varchar(20)")
  address: String
  city: String @col(dataType: "varchar(80)")
  state: String @col(dataType: "varchar(80)")
  pincode: String @col(dataType: "varchar(12)")
  emergencyContact: String @col(name: "emergency_contact", dataType: "varchar(20)")
  transportRequired: Boolean @col(name: "transport_required") @default(value: false)
  aadhaarDocumentUrl: String
  transferCertificateUrl: String
  birthCertificateUrl: String
  admissionDate: Date!
  status: String! @col(dataType: "varchar(20)") @default(value: "ACTIVE")
  isActive: Boolean! @default(value: true)
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

extend type Student {
  branchId: UUID!
  wingId: UUID
  academicClassId: UUID!
  sectionId: UUID!
  parentId: UUID!
}

type StudentParent @table(name: "student_parents", key: ["student", "user", "relationship"]) @index(fields: ["studentId"]) @index(fields: ["userId"]) {
  id: UUID! @default(expr: "uuidV4()")
  student: Student!
  user: User!
  relationship: String! @col(dataType: "varchar(20)")
  createdAt: Timestamp! @col(name: "created_at") @default(expr: "request.time")
}

extend type StudentParent {
  studentId: UUID!
  userId: UUID!
}

type StudentSectionHistory @table(name: "student_section_history", key: "id") @index(fields: ["studentId", "changedAt"]) {
  id: UUID! @default(expr: "uuidV4()")
  student: Student!
  oldSection: Section!
  newSection: Section!
  changedBy: User!
  changedAt: Timestamp! @col(name: "changed_at") @default(expr: "request.time")
}

extend type StudentSectionHistory {
  studentId: UUID!
  oldSectionId: UUID!
  newSectionId: UUID!
  changedById: UUID!
}

type StudentPromotionHistory @table(name: "student_promotion_history", key: "id") @index(fields: ["studentId", "promotedAt"]) @index(fields: ["branchId", "academicYear"]) {
  id: UUID! @default(expr: "uuidV4()")
  branch: Branch!
  student: Student!
  fromClass: AcademicClass!
  toClass: AcademicClass
  fromSection: Section!
  toSection: Section
  promotionStatus: String! @col(name: "promotion_status", dataType: "varchar(20)") @default(value: "PROMOTED")
  academicYear: Int! @col(name: "academic_year")
  promotedBy: User!
  promotedAt: Timestamp! @col(name: "promoted_at") @default(expr: "request.time")
  remarks: String
}

extend type StudentPromotionHistory {
  branchId: UUID!
  studentId: UUID!
  fromClassId: UUID!
  toClassId: UUID
  fromSectionId: UUID!
  toSectionId: UUID
  promotedById: UUID!
}

type TeacherAssignment @table(name: "teacher_assignments", key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  teacher: User!
  branch: Branch!
  # Deprecated: assignment wing is derived from section/class.
  wing: Wing
  academicClass: AcademicClass!
  section: Section!
  subjectName: String @col(dataType: "varchar(80)")
  isClassTeacher: Boolean! @default(value: false)
  isActive: Boolean! @default(value: true)
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

extend type TeacherAssignment {
  teacherId: UUID!
  branchId: UUID!
  wingId: UUID
  academicClassId: UUID!
  sectionId: UUID!
}

type Attendance @table(name: "attendance", key: "id")
  @index(fields: ["studentId", "attendanceDate"])
  @index(fields: ["branchId", "attendanceDate"])
  @index(fields: ["academicYearId", "sectionId"]) {
  id: UUID! @default(expr: "uuidV4()")
  student: Student!
  academicClass: AcademicClass!
  section: Section!
  branch: Branch
  academicYear: AcademicYear
  attendanceDate: Date!
  # PRESENT | ABSENT | HALF_DAY | LATE | MEDICAL_LEAVE | APPROVED_LEAVE
  # HOLIDAY | SUNDAY_HOLIDAY | PUBLIC_HOLIDAY | SCHOOL_HOLIDAY
  status: String! @col(dataType: "varchar(30)")
  halfDaySession: String @col(name: "half_day_session", dataType: "varchar(20)")
  # Locked immediately on first save — no re-submission allowed
  isLocked: Boolean! @default(value: false) @col(name: "is_locked")
  lockedAt: Timestamp @col(name: "locked_at")
  markedBy: User!
  editedBy: User
  remarks: String
  editReason: String @col(name: "edit_reason", dataType: "varchar(500)")
  lastEditedAt: Timestamp @col(name: "last_edited_at")
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

extend type Attendance {
  studentId: UUID!
  academicClassId: UUID!
  sectionId: UUID!
  branchId: UUID
  academicYearId: UUID
  markedById: UUID!
  editedById: UUID
}

# Audit trail for every coordinator/principal edit on attendance records.
# INSERT-ONLY — never update or delete.
type AttendanceAuditLog
  @table(name: "attendance_audit_logs", key: "id")
  @index(fields: ["attendanceId"])
  @index(fields: ["studentId", "attendanceDate"])
  @index(fields: ["editedById", "editedAt"])
  @index(fields: ["branchId", "editedAt"])
  @index(fields: ["sectionId", "attendanceDate"]) {
  id: UUID! @default(expr: "uuidV4()")
  attendance: Attendance!
  student: Student!
  section: Section!
  branch: Branch!
  academicYear: AcademicYear
  attendanceDate: Date!
  editedBy: User!
  editedByRole: String! @col(name: "edited_by_role", dataType: "varchar(30)")
  previousStatus: String! @col(name: "previous_status", dataType: "varchar(30)")
  newStatus: String! @col(name: "new_status", dataType: "varchar(30)")
  reason: String! @col(dataType: "varchar(500)")
  editedAt: Timestamp! @col(name: "edited_at") @default(expr: "request.time")
}

extend type AttendanceAuditLog {
  attendanceId: UUID!
  studentId: UUID!
  sectionId: UUID!
  branchId: UUID!
  academicYearId: UUID
  editedById: UUID!
}

# Pre-calculated monthly summaries per student — cache layer for Parent Dashboard and Reports.
# Upserted after every attendance submission or correction.
type AttendanceSummary
  @table(name: "attendance_summaries", key: ["student", "yearMonth", "academicYear"])
  @index(fields: ["sectionId", "yearMonth"])
  @index(fields: ["branchId", "yearMonth"])
  @index(fields: ["branchId", "academicYearId", "attendancePct"]) {
  student: Student!
  branch: Branch!
  section: Section!
  academicYear: AcademicYear!
  yearMonth: String! @col(name: "year_month", dataType: "varchar(7)")
  totalWorkingDays: Int! @col(name: "total_working_days") @default(value: 0)
  effectiveDays: Int! @col(name: "effective_days") @default(value: 0)
  presentCount: Int! @col(name: "present_count") @default(value: 0)
  absentCount: Int! @col(name: "absent_count") @default(value: 0)
  halfDayCount: Int! @col(name: "half_day_count") @default(value: 0)
  lateCount: Int! @col(name: "late_count") @default(value: 0)
  medicalLeaveCount: Int! @col(name: "medical_leave_count") @default(value: 0)
  approvedLeaveCount: Int! @col(name: "approved_leave_count") @default(value: 0)
  holidayCount: Int! @col(name: "holiday_count") @default(value: 0)
  sundayCount: Int! @col(name: "sunday_count") @default(value: 0)
  attendancePct: Float! @col(name: "attendance_pct") @default(value: 0.0)
  academicYearPct: Float! @col(name: "academic_year_pct") @default(value: 0.0)
  lastRecalcAt: Timestamp! @col(name: "last_recalc_at") @default(expr: "request.time")
}

extend type AttendanceSummary {
  studentId: UUID!
  branchId: UUID!
  sectionId: UUID!
  academicYearId: UUID!
}

# Tracks which low-attendance alerts have been sent — prevents duplicate notifications.
type AttendanceAlertLog
  @table(name: "attendance_alert_logs", key: "id")
  @index(fields: ["studentId", "threshold", "yearMonth"])
  @index(fields: ["branchId", "sentAt"]) {
  id: UUID! @default(expr: "uuidV4()")
  student: Student!
  branch: Branch!
  academicYear: AcademicYear!
  threshold: Int!
  alertType: String! @col(name: "alert_type", dataType: "varchar(20)")
  yearMonth: String @col(name: "year_month", dataType: "varchar(7)")
  currentPct: Float! @col(name: "current_pct")
  sentToRoles: String! @col(name: "sent_to_roles", dataType: "varchar(200)")
  sentAt: Timestamp! @col(name: "sent_at") @default(expr: "request.time")
  recovered: Boolean! @default(value: false)
  recoveredAt: Timestamp @col(name: "recovered_at")
}

extend type AttendanceAlertLog {
  studentId: UUID!
  branchId: UUID!
  academicYearId: UUID!
}

# Branch-specific holidays — controls orange calendar cells and disables attendance.
# type: NATIONAL | STATE | SCHOOL | FESTIVAL | EMERGENCY
type Holiday @table(name: "holidays", key: "id") @index(fields: ["branchId", "date"]) {
  id: UUID! @default(expr: "uuidV4()")
  branch: Branch!
  name: String! @col(dataType: "varchar(140)")
  date: Date!
  type: String! @col(dataType: "varchar(30)") @default(value: "SCHOOL")
  description: String @col(dataType: "varchar(300)")
  isPublicHoliday: Boolean! @col(name: "is_public_holiday") @default(value: false)
  isSeeded: Boolean! @col(name: "is_seeded") @default(value: false)
  createdBy: User!
  updatedBy: User
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

extend type Holiday {
  branchId: UUID!
  createdById: UUID!
  updatedById: UUID
}

type FeeStructure @table(name: "fee_structures", key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  branch: Branch!
  academicClass: AcademicClass!
